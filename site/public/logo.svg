<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#gradient)" opacity="0.1"/>
  
  <!-- Main hexagon representing the inference engine -->
  <path d="M50 15 L75 30 L75 60 L50 75 L25 60 L25 30 Z" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="2"/>
  
  <!-- Inner nodes representing semantic inference -->
  <circle cx="50" cy="30" r="4" fill="url(#gradient)"/>
  <circle cx="35" cy="45" r="4" fill="url(#gradient)"/>
  <circle cx="65" cy="45" r="4" fill="url(#gradient)"/>
  <circle cx="50" cy="60" r="4" fill="url(#gradient)"/>
  
  <!-- Connection lines showing inference relationships -->
  <line x1="50" y1="30" x2="35" y2="45" stroke="url(#gradient)" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="30" x2="65" y2="45" stroke="url(#gradient)" stroke-width="1" opacity="0.6"/>
  <line x1="35" y1="45" x2="50" y2="60" stroke="url(#gradient)" stroke-width="1" opacity="0.6"/>
  <line x1="65" y1="45" x2="50" y2="60" stroke="url(#gradient)" stroke-width="1" opacity="0.6"/>
  
  <!-- Code brackets representing template generation -->
  <text x="50" y="85" font-family="monospace" font-size="12" text-anchor="middle" fill="url(#gradient)">&lt;/&gt;</text>
</svg>
