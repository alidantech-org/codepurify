codepot: "1.0"
key: demo_api
version: 1
info:
  title: Demo API
  version: 1.0.0
urls: []
properties:
  primitives:
    id:
      type: string
      format: uuid
    displayName:
      type: string
      validation:
        minLength: 2
        maxLength: 80
    email:
      type: string
      format: email
  enums: {}
  composites: {}
schemas:
  entities:
    User:
      fields:
        id:
          type:
            $ref: "#/properties/id"
          required: true
          query:
            filter: true
            sort: true
            select: true
          persistence:
            mode: stored
            generated: true
            immutable: true
        name:
          type:
            $ref: "#/properties/displayName"
          required: true
          query:
            filter: true
            sort: true
        email:
          type:
            $ref: "#/properties/email"
          required: true
          access:
            read: public
            sensitive: true
  models:
    UserRead:
      from:
        $ref: "#/schemas/entities/User"
      category: read
    UserCreate:
      from:
        $ref: "#/schemas/entities/User"
      category: create
    UserPatch:
      from:
        $ref: "#/schemas/entities/User"
      category: patch
    UserQuery:
      from:
        $ref: "#/schemas/entities/User"
      category: query
    UserProjection:
      from:
        $ref: "#/schemas/entities/User"
      category: projection
    UserRedacted:
      from:
        $ref: "#/schemas/entities/User"
      category: redacted
    UserDerived:
      from:
        $ref: "#/schemas/entities/User"
      category: derived
    UserInternal:
      from:
        $ref: "#/schemas/entities/User"
      category: internal
  dtos:
    ErrorResponse:
      fields:
        message:
          $ref: "#/schemas/entities/User/fields/name"
  params: {}
transport:
  contentTypes:
    json:
      value: application/json
      strategy: json
  requests: {}
  responses:
    BadRequest:
      status: 400
      schema:
        $ref: "#/schemas/dtos/ErrorResponse"
      contentType:
        $ref: application/json
    Unauthorized:
      status: 401
      schema:
        $ref: "#/schemas/dtos/ErrorResponse"
      contentType:
        $ref: application/json
security:
  schemes:
    bearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  auth:
    jwt:
      mode: any
      schemes:
        - scheme:
            $ref: "#/security/schemes/bearer"
  roleSources: {}
  roleSets: {}
  contexts: {}
  guards: {}
resources:
  users:
    key: users
    folders:
      - platform
      - auth
    defaults:
      security:
        auth:
          $ref: "#/security/auth/jwt"
        protected: true
    properties: {}
    schemas: {}
    operations:
      listUsers:
        input: {}
        output: {}
      getUser:
        input: {}
        output: {}
    routes:
      listUsers:
        methods:
          get:
            operation:
              $ref: "#/resources/users/operations/listUsers"
            responses:
              "200":
                schema:
                  $ref: "#/schemas/models/UserRead"
                  array: true
                contentType: application/json
              "400":
                $ref: "#/transport/responses/BadRequest"
      getUser:
        methods:
          get:
            operation:
              $ref: "#/resources/users/operations/getUser"
            responses:
              "200":
                schema:
                  $ref: "#/schemas/models/UserRead"
                contentType: application/json
              "401":
                $ref: "#/transport/responses/Unauthorized"
