version: 1
name: typescript-basic

language:
  name: typescript
  extensions:
    - ts
    - tsx
    - json
    - md
    - txt

defaults:
  global_alias: shared
  global_folders: []

ignore:
  file: .codepotxIgnore
  patterns:
    - .DS_Store
    - __pycache__/
    - "*.tmp"
    - "*.bak"
    - "*.old"

templates:
  enums:
    select: enums.each
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - enums
    barrel: true

  composites:
    select: composites.each
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - composites
    barrel: true
    resolves:
      enums:
        $ref: "#/templates/enums/barrel"

  models:
    select: models.each
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - models
    barrel: true
    resolves:
      enums:
        $ref: "#/templates/enums/barrel"
      composites:
        $ref: "#/templates/composites/barrel"
      models:
        $ref: "#/templates/models/barrel"

  dtos:
    select: dtos.by_owner
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - dtos
    barrel: true
    resolves:
      enums:
        $ref: "#/templates/enums/barrel"
      composites:
        $ref: "#/templates/composites/barrel"
      models:
        $ref: "#/templates/models/barrel"

  errors:
    select: errors.each
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - errors
    barrel: true

  resources:
    select: resources.each
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - resources
    barrel: false
    resolves:
      route_paths:
        $ref: "#/templates/route_paths"
      routes:
        $ref: "#/templates/routes"
      operations:
        $ref: "#/templates/operations"

  route_paths:
    select: route_paths.by_owner
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - resources
    barrel: false

  routes:
    select: routes.by_owner
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - resources
    barrel: false

  operations:
    select: operations.by_owner
    folders:
      - "[owner.folders]"
      - "[owner.name.path]"
      - resources
    barrel: false