version: 1
name: typescript
label: TypeScript package
description: General TypeScript package generated from a compiled Codepot spec.
language:
  name: typescript
  extension: ts
  package_manager: pnpm
defaults:
  output: generated/typescript
  global_alias: shared
settings:
  require_template_select: true
  validate_unique_outputs: true
  validate_resolves: true
commands:
  install: pnpm install
  format: pnpm prettier --write .
  typecheck: pnpm tsc --noEmit
messages:
  success:
    - Generated TypeScript package.
    - Run `pnpm install`.
    - Run `pnpm tsc --noEmit`.
templates:
  package_json:
    kind: package
    select: once
    template: package.json.j2
    output:
      paths:
        - file: package.json
  tsconfig:
    kind: config
    select: once
    template: tsconfig.json.j2
    output:
      paths:
        - file: tsconfig.json
  readme:
    kind: docs
    select: once
    template: README.md.j2
    output:
      paths:
        - file: README.md
  enum_files:
    kind: source
    select: enums.each
    template: src/enums/enum.ts.j2
    output:
      paths:
        - folders:
            - src
            - enums
          file: $[item.name.path].$[language.extension]
    barrel:
      enabled: true
      template: src/enums/index.ts.j2
      export: named
      output:
        paths:
          - folders:
              - src
              - enums
            file: index.$[language.extension]
  composite_files:
    kind: source
    select: composites.each
    template: src/composites/composite.ts.j2
    output:
      paths:
        - folders:
            - src
            - composites
          file: $[item.name.path].$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files"
    barrel:
      enabled: true
      template: src/composites/index.ts.j2
      export: named
      output:
        paths:
          - folders:
              - src
              - composites
            file: index.$[language.extension]
  model_files:
    kind: source
    select: models.each
    template: src/models/model.ts.j2
    output:
      paths:
        - folders:
            - src
            - models
          file: $[item.name.path].$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files/barrel"
      models:
        $ref: "#/templates/model_files"
    barrel:
      enabled: true
      template: src/models/index.ts.j2
      export: named
      output:
        paths:
          - folders:
              - src
              - models
              - $[owner.name.path]
            file: index.$[language.extension]
  dto_files:
    kind: source
    select: dtos.by_owner
    template: src/dtos/dto.ts.j2
    output:
      paths:
        - folders:
            - src
            - $[owner.name.path]
          file: dtos.$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files/barrel"
      models:
        $ref: "#/templates/model_files/barrel"
      dtos:
        $ref: "#/templates/dto_files"
    barrel:
      enabled: true
      template: src/dtos/index.ts.j2
      export: star
      output:
        paths:
          - folders:
              - src
              - dtos
            file: index.$[language.extension]
  error_files:
    kind: source
    select: errors.each
    template: src/errors/error.ts.j2
    output:
      paths:
        - folders:
            - src
            - errors
          file: $[item.name.path].$[language.extension]
    resolves:
      dtos:
        $ref: "#/templates/dto_files"
      errors:
        $ref: "#/templates/error_files"
    barrel:
      enabled: true
      template: src/errors/index.ts.j2
      export: named
      output:
        paths:
          - folders:
              - src
              - errors
            file: index.$[language.extension]
  route_path_files:
    kind: source
    select: route_paths.by_resource
    template: src/resources/route-paths.ts.j2
    output:
      paths:
        - folders:
            - src
            - resources
            - $[resource.folders]
            - $[resource.name.path]
          file: route-paths.$[language.extension]
  route_files:
    kind: source
    select: routes.by_resource
    template: src/resources/routes.ts.j2
    output:
      paths:
        - folders:
            - src
            - resources
            - $[resource.folders]
            - $[resource.name.path]
          file: routes.$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files/barrel"
      models:
        $ref: "#/templates/model_files/barrel"
      dtos:
        $ref: "#/templates/dto_files"
      errors:
        $ref: "#/templates/error_files/barrel"
      operations:
        $ref: "#/templates/operation_files"
      route_paths:
        $ref: "#/templates/route_path_files"
      routes:
        $ref: "#/templates/route_files"
  operation_files:
    kind: source
    select: operations.by_resource
    template: src/resources/operations.ts.j2
    output:
      paths:
        - folders:
            - src
            - resources
            - $[resource.folders]
            - $[resource.name.path]
          file: operations.$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files/barrel"
      models:
        $ref: "#/templates/model_files/barrel"
      dtos:
        $ref: "#/templates/dto_files"
      errors:
        $ref: "#/templates/error_files/barrel"
      operations:
        $ref: "#/templates/operation_files"
  resource_files:
    kind: source
    select: resources.each
    template: src/resources/resource.ts.j2
    output:
      paths:
        - folders:
            - src
            - resources
            - $[resource.folders]
            - $[resource.name.path]
          file: index.$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files/barrel"
      models:
        $ref: "#/templates/model_files/barrel"
      dtos:
        $ref: "#/templates/dto_files"
      errors:
        $ref: "#/templates/error_files/barrel"
      operations:
        $ref: "#/templates/operation_files"
      route_paths:
        $ref: "#/templates/route_path_files"
      routes:
        $ref: "#/templates/route_files"
      resources:
        $ref: "#/templates/resource_files"
  root_index:
    kind: barrel
    select: once
    template: src/index.ts.j2
    output:
      paths:
        - folders:
            - src
          file: index.$[language.extension]
    resolves:
      enums:
        $ref: "#/templates/enum_files/barrel"
      composites:
        $ref: "#/templates/composite_files/barrel"
      models:
        $ref: "#/templates/model_files/barrel"
      dtos:
        $ref: "#/templates/dto_files/barrel"
      errors:
        $ref: "#/templates/error_files/barrel"
      resources:
        $ref: "#/templates/resource_files"