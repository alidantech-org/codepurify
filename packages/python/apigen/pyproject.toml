[project]
name = "generator"
version = "0.1.0"
description = "General OpenAPI inference and multi-language code generation engine"
requires-python = ">=3.11"
dependencies = [
  "typer>=0.12.5",
  "rich>=13.9.0",
  "questionary>=2.0.0",
  "pydantic>=2.8.0",
  "pydantic-settings>=2.4.0",
  "PyYAML>=6.0.2",
  "jinja2>=3.1.4",
  "pluralizer>=2.0.0",
]

[project.scripts]
openapi-generator = "cli.main:app"

[tool.setuptools.package-dir]
"" = "src"
cli = "cli"

[tool.setuptools.packages.find]
where = ["src", "."]
include = [
  "cli*",
  "constants*",
  "core*",
  "emission*",
  "inference*",
  "languages*",
  "openapi*",
  "runtime*",
  "utils*",
]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = []

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src", "."]