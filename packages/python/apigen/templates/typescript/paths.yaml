template_extension: ".j2"
strip_template_extension: true
allow_raw_files: true

imports:
  strategy: relative

folders:
  version:
    mode: once
    parts:
      - src

  model:
    select: schemas.emit_models
    as: model
    parts:
      - src
      - schemas
      - [model.emit.resource_path]
      - models
      - [model.name.path.o]

  dto:
    select: schemas.emit_dtos
    as: dto
    parts:
      - src
      - schemas
      - [dto.emit.resource_path]
      - dtos
      - [dto.emit.folder_path]

  enum:
    select: schemas.emit_enums
    as: enum
    parts:
      - src
      - schemas
      - [enum.emit.resource_path]
      - enums
      - [enum.name.path.o]

  operation:
    select: operations
    as: operation
    parts:
      - src
      - operations
      - [operation.emit.resource_path]
      - [operation.name.path.o]

  route_root:
    mode: once
    parts:
      - src
      - routes

  route_group:
    select: resources
    as: resource
    parts:
      - src
      - routes
      - constants

  feature:
    select: resources
    as: resource
    parts:
      - src
      - features