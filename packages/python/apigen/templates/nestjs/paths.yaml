template_extension: ".j2"
strip_template_extension: true
allow_raw_files: true

imports:
  strategy: relative

folders:
  resource:
    select: resources
    as: resource
    parts:
      - src
      - modules
      - [resource.path]
      - [resource.name.path.o]

  use_case:
    select: operations
    as: operation
    parts:
      - src
      - modules
      - [operation.emit.resource_path]
      - use-cases
      - [operation.name.path.o]

  dto:
    select: schemas.emit_dtos
    as: dto
    parts:
      - src
      - modules
      - [dto.emit.resource_path]
      - dto

  model:
    select: schemas.emit_models
    as: model
    parts:
      - src
      - modules
      - [model.emit.resource_path]
      - models

  enum:
    select: schemas.emit_enums
    as: enum
    parts:
      - src
      - modules
      - [enum.emit.resource_path]
      - enums

  root:
    mode: once
    parts:
      - src
