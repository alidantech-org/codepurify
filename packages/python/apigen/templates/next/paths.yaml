template_extension: ".j2"
strip_template_extension: true
allow_raw_files: true

imports:
  strategy: relative

folders:
  root:
    mode: once
    parts:
      - lib
      - server

  resource:
    select: resources
    as: resource
    parts:
      - lib
      - server
      - actions

  model:
    select: schemas.emit_models
    as: model
    parts:
      - lib
      - server
      - types
      - [model.emit.resource_path]
      - models

  dto:
    select: schemas.emit_dtos
    as: dto
    parts:
      - lib
      - server
      - types
      - [dto.emit.resource_path]
      - dto

  enum:
    select: schemas.emit_enums
    as: enum
    parts:
      - lib
      - server
      - types
      - [enum.emit.resource_path]
      - enums
