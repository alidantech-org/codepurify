template_extension: ".j2"
strip_template_extension: true
allow_raw_files: true

imports:
  strategy: relative

folders:
  resource:
    select: resources
    as: resource
    parts:
      - docs
      - resources
      - [resource.emit.resource_path]

  model:
    select: schemas.emit_models
    as: model
    parts:
      - docs
      - resources
      - [model.emit.resource_path]
      - schemas
      - models

  dto:
    select: schemas.emit_dtos
    as: dto
    parts:
      - docs
      - resources
      - [dto.emit.resource_path]
      - schemas
      - dtos

  enum:
    select: schemas.emit_enums
    as: enum
    parts:
      - docs
      - resources
      - [enum.emit.resource_path]
      - schemas
      - enums

  operation:
    select: operations
    as: operation
    parts:
      - docs
      - resources
      - [operation.emit.resource_path]
      - operations
