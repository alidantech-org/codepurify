template_extension: ".j2"
strip_template_extension: true
allow_raw_files: true

variables:
  models:
    select: schemas.emit_models
    as: model
    expose:
      name: model.name
      kind: model.api.kind
      resource: model.api.resource
      dependencies: model.emit.dependencies

  dtos:
    select: schemas.emit_dtos
    as: dto
    expose:
      name: dto.name
      kind: dto.api.kind
      resource: dto.api.resource
      dependencies: dto.emit.dependencies

  enums:
    select: schemas.emit_enums
    as: enum
    expose:
      name: enum.name
      kind: enum.api.kind
      resource: enum.api.resource
      dependencies: enum.emit.dependencies

  primitives:
    select: schemas.primitives
    as: primitive
    expose:
      name: primitive.name
      kind: primitive.api.kind
      resource: primitive.api.resource
      dependencies: primitive.emit.dependencies

  schemas:
    select: schemas.all
    as: schema
    expose:
      name: schema.name
      kind: schema.api.kind
      resource: schema.api.resource
      dependencies: schema.emit.dependencies

  resources:
    select: resources
    as: resource
    expose:
      name: resource.name
      path: resource.path
      path_name: resource.path_name
      operations_count: resource.meta.operations_count

  operations:
    select: operations
    as: operation
    expose:
      name: operation.name
      method: operation.api.method
      resource: operation.api.resource
      dependencies: operation.emit.dependencies

meta:
  description: "Debug template path variables for selector-driven emission."
