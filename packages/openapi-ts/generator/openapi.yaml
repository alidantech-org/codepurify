      required:
        - id
        - createdAt
        - updatedAt
      x-codegen:
        kind: model
        resource:
          name: shared
          path:
            - shared
        entity:
          name: Base
          variant: full
          access: public
    BaseInternalModel:
      type: object
      properties:
