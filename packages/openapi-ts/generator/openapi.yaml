openapi: 3.1.0
info:
  title: RideRescue API
  version: v1
  description: RideRescue backend API
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://api.riderescueautolink.com
    description: RideRescue API
security:
  - bearerAuth: []
paths:
  /users:
    x-codegen:
      resource:
        name: User
        path:
          - platform
          - auth
    get:
      operationId: listUsers
      tags:
        - User
      summary: List users
      responses:
        '200':
          $ref: '#/components/responses/ListUsers200Response'
        '400':
          $ref: '#/components/responses/Default400Response'
        '401':
          $ref: '#/components/responses/Default401Response'
        '403':
          $ref: '#/components/responses/Default403Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '422':
          $ref: '#/components/responses/Default422Response'
        '500':
          $ref: '#/components/responses/Default500Response'
      parameters:
        - $ref: '#/components/parameters/PageQueryParam'
        - $ref: '#/components/parameters/LimitQueryParam'
        - $ref: '#/components/parameters/SortQueryParam'
        - $ref: '#/components/parameters/FieldsQueryParam'
        - $ref: '#/components/parameters/PopulateQueryParam'
        - $ref: '#/components/parameters/SearchQueryParam'
        - $ref: '#/components/parameters/UsersFilterQueryParam'
        - $ref: '#/components/parameters/UsersSortQueryParam'
        - $ref: '#/components/parameters/UsersSelectQueryParam'
      x-codegen:
        parameters:
          target:
            $ref: '#/components/schemas/UserListQuery'
    post:
      operationId: createUser
      tags:
        - User
      summary: Create user
      responses:
        '201':
          $ref: '#/components/responses/CreateUser201Response'
        '400':
          $ref: '#/components/responses/Default400Response'
        '401':
          $ref: '#/components/responses/Default401Response'
        '403':
          $ref: '#/components/responses/Default403Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '409':
          $ref: '#/components/responses/CreateUser409Response'
        '422':
          $ref: '#/components/responses/Default422Response'
        '500':
          $ref: '#/components/responses/Default500Response'
      requestBody:
        $ref: '#/components/requestBodies/CreateUserRequestBody'
  /users/me:
    x-codegen:
      resource:
        name: User
        path:
          - platform
          - auth
    get:
      operationId: getCurrentUser
      tags:
        - User
      summary: Get current user
      responses:
        '200':
          $ref: '#/components/responses/GetCurrentUser200Response'
        '400':
          $ref: '#/components/responses/Default400Response'
        '401':
          $ref: '#/components/responses/Default401Response'
        '403':
          $ref: '#/components/responses/Default403Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '422':
          $ref: '#/components/responses/Default422Response'
        '500':
          $ref: '#/components/responses/Default500Response'
      parameters:
        - $ref: '#/components/parameters/FieldsQueryParam'
        - $ref: '#/components/parameters/PopulateQueryParam'
        - $ref: '#/components/parameters/UsersSelectQueryParam'
      x-codegen:
        parameters:
          target:
            $ref: '#/components/schemas/UserDetailQuery'
  /users/{userId}:
    x-codegen:
      resource:
        name: User
        path:
          - platform
          - auth
    parameters:
      - $ref: '#/components/parameters/UsersUserIdPathParam'
    get:
      operationId: getUserById
      tags:
        - User
      summary: Get user by ID
      responses:
        '200':
          $ref: '#/components/responses/GetUserById200Response'
        '400':
          $ref: '#/components/responses/Default400Response'
        '401':
          $ref: '#/components/responses/Default401Response'
        '403':
          $ref: '#/components/responses/Default403Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '422':
          $ref: '#/components/responses/Default422Response'
        '500':
          $ref: '#/components/responses/Default500Response'
      parameters:
        - $ref: '#/components/parameters/FieldsQueryParam'
        - $ref: '#/components/parameters/PopulateQueryParam'
        - $ref: '#/components/parameters/UsersSelectQueryParam'
      x-codegen:
        parameters:
          target:
            $ref: '#/components/schemas/UserDetailQuery'
    patch:
      operationId: updateUser
      tags:
        - User
      summary: Update user
      responses:
        '200':
          $ref: '#/components/responses/UpdateUser200Response'
        '400':
          $ref: '#/components/responses/Default400Response'
        '401':
          $ref: '#/components/responses/Default401Response'
        '403':
          $ref: '#/components/responses/Default403Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '422':
          $ref: '#/components/responses/Default422Response'
        '500':
          $ref: '#/components/responses/Default500Response'
      requestBody:
        $ref: '#/components/requestBodies/UpdateUserRequestBody'
    delete:
      operationId: deleteUser
      tags:
        - User
      summary: Delete user
      responses:
        '200':
          $ref: '#/components/responses/DeleteUser200Response'
        '400':
          $ref: '#/components/responses/Default400Response'
        '401':
          $ref: '#/components/responses/Default401Response'
        '403':
          $ref: '#/components/responses/Default403Response'
        '404':
          $ref: '#/components/responses/Default404Response'
        '422':
          $ref: '#/components/responses/Default422Response'
        '500':
          $ref: '#/components/responses/Default500Response'
components:
  schemas:
    ApiMessage:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SharedSuccess'
        message:
          $ref: '#/components/schemas/SharedMessage'
      required:
        - success
        - message
      x-codegen:
        kind: dto
        shared: true
        role: response
    PaginatedMeta:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/SharedPage'
        limit:
          $ref: '#/components/schemas/SharedLimit'
        total:
          $ref: '#/components/schemas/SharedTotal'
      required:
        - page
        - limit
        - total
      x-codegen:
        kind: dto
        shared: true
    PaginatedQuery:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/SharedPage'
        limit:
          $ref: '#/components/schemas/SharedLimit'
        sort:
          $ref: '#/components/schemas/SharedSort'
        fields:
          $ref: '#/components/schemas/SharedFields'
        populate:
          $ref: '#/components/schemas/SharedPopulate'
        search:
          $ref: '#/components/schemas/SharedSearch'
      x-codegen:
        kind: dto
        shared: true
    DetailsQuery:
      type: object
      properties:
        fields:
          $ref: '#/components/schemas/SharedFields'
        populate:
          $ref: '#/components/schemas/SharedPopulate'
      x-codegen:
        kind: dto
        shared: true
    PaginatedResponse:
      type: object
      properties:
        success:
          $ref: '#/components/schemas/SharedSuccess'
        message:
          $ref: '#/components/schemas/SharedMessage'
      required:
        - success
        - message
      x-codegen:
        kind: dto
        shared: true
    SharedMongoId:
      type: string
      pattern: ^[a-f\d]{24}$
      description: Mongo ObjectId
      x-codegen:
        kind: primitive
    SharedDateTime:
      type: string
      format: date-time
      pattern: ^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))T(?:(?:[01]\d|2[0-3]):[0-5]\d(?::[0-5]\d(?:\.\d+)?)?(?:Z))$
      description: ISO datetime
      x-codegen:
        kind: primitive
    SharedDisplayName:
      type: string
      minLength: 1
      maxLength: 100
      description: Display name
      x-codegen:
        kind: primitive
    SharedSuccess:
      type: boolean
      description: Request success state
      x-codegen:
        kind: primitive
    SharedMessage:
      type: string
      minLength: 1
      maxLength: 500
      description: Human readable message
      x-codegen:
        kind: primitive
    SharedPage:
      type: integer
      maximum: 10000
      minimum: 1
      x-codegen:
        kind: primitive
    SharedLimit:
      type: integer
      maximum: 100
      minimum: 1
      x-codegen:
        kind: primitive
    SharedTotal:
      type: integer
      minimum: 0
      maximum: 9007199254740991
      x-codegen:
        kind: primitive
    SharedSort:
      type: string
      x-codegen:
        kind: primitive
    SharedFields:
      type: string
      x-codegen:
        kind: primitive
    SharedPopulate:
      type: string
      x-codegen:
        kind: primitive
    SharedSearch:
      type: string
      x-codegen:
        kind: primitive
    BaseId:
      $ref: '#/components/schemas/SharedMongoId'
    BaseCreatedAt:
      $ref: '#/components/schemas/SharedDateTime'
    BaseUpdatedAt:
      $ref: '#/components/schemas/SharedDateTime'
    BaseDeletedAt:
      anyOf:
        - $ref: '#/components/schemas/SharedDateTime'
        - type: 'null'
      x-codegen:
        kind: primitive
        sensitive: true
    BaseQuerySortValue:
      type: string
      enum:
        - __none__
      x-codegen:
        kind: enum
    BaseQuerySelectValue:
      type: string
      enum:
        - id
        - createdAt
        - updatedAt
      x-codegen:
        kind: enum
    BaseAbstractModel:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/BaseId'
        createdAt:
          $ref: '#/components/schemas/BaseCreatedAt'
        updatedAt:
          $ref: '#/components/schemas/BaseUpdatedAt'
        deletedAt:
          $ref: '#/components/schemas/BaseDeletedAt'
      required:
        - id
        - createdAt
        - updatedAt
        - deletedAt
      x-codegen:
        kind: model
        resource:
          name: shared
          path:
            - shared
        entity:
          name: Base
          variant: full
          access: default
        abstract: true
    BasePublicModel:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/BaseId'
        createdAt:
          $ref: '#/components/schemas/BaseCreatedAt'
        updatedAt:
