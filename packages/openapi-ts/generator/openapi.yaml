        kind: primitive
        sensitive: true
    UserEmail:
      type: string
      format: email
      pattern: ^(?!\.)(?!.*\.\.)([A-Za-z0-9_'+\-\.]*)[A-Za-z0-9_+-]@([A-Za-z0-9][A-Za-z0-9\-]*\.)+[A-Za-z]{2,}$
      x-codegen:
        kind: primitive
        query:
          filter: true
          operators:
            - exact
            - search
          sort: true
    UserName:
      $ref: '#/components/schemas/SharedDisplayName'
    UserPhone:
      type:
        - string
        - 'null'
      x-codegen:
        kind: primitive
        query:
          filter: true
          operators:
            - exact
            - search
    UserAvatar:
      format: uri
      type:
        - string
        - 'null'
      x-codegen:
        kind: primitive
    UserPassword:
      type: string
      x-codegen:
        kind: primitive
        sensitive: true
    UserRoles:
      type: string
      enum:
        - admin
        - user
        - driver
        - service_provider
      x-codegen:
        kind: enum
        query:
          filter: true
          operators:
            - exact
            - in
          sort: true
    UserStatus:
      type: string
      enum:
