services:
  site:
    build:
      context: .
      dockerfile: ./site/Dockerfile
    ports:
      - "3020:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    container_name: codepurify-site
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s